    <div class="main">

        <h2>📜 Trade History</h2>

<table border="1">
<tr>
    <th>Time</th>
    <th>Signal</th>
    <th>Entry</th>
    <th>Exit</th>
    <th>Profit</th>
</tr>

<tbody id="historyTable"></tbody>
</table>

<script>
function loadHistory(){
    fetch("/api/history")
    .then(res => res.json())
    .then(data => {
        let table = document.getElementById("historyTable");
        table.innerHTML = "";

        data.forEach(trade => {
            let row = `
            <tr>
                <td>${trade.time}</td>
                <td>${trade.signal}</td>
                <td>${trade.entry}</td>
                <td>${trade.exit}</td>
                <td>${trade.profit}</td>
            </tr>`;
            table.innerHTML += row;
        });
    });
}

loadHistory();
</script>
